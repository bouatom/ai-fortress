site_name: AI Fortress — Operator's Guide
site_description: SE self-serve guide for the Trend Vision One AI Security demo
site_author: Trend Micro SE Team
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    scheme: slate
    primary: red
    accent: orange
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - toc.follow
  icon:
    logo: material/shield-lock
    favicon: material/shield-lock

nav:
  - Home: index.md
  - Setup:
    - Prerequisites: setup/prerequisites.md
    - Getting Your Demo URL: setup/cloudformation.md
    - API Keys: setup/api-keys.md
  - Demo Script:
    - Overview: demo-script/overview.md
    - Act 1 — Unprotected AI: demo-script/act1-unprotected.md
    - Act 2 — AI Guard: demo-script/act2-ai-guard.md
    - Act 3 — AI Scanner: demo-script/act3-scanner.md
    - Act 4 — Container Scan: demo-script/act4-container.md
    - Act 5 — OWASP Score: demo-script/act5-owasp.md
    - Troubleshooting: demo-script/troubleshooting.md
  - Reference:
    - API Endpoints: reference/api-endpoints.md
    - OWASP Mapping: reference/owasp-mapping.md
    - Architecture: reference/architecture.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
